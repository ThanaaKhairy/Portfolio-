<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You!</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }
        
        :root {
            --primary-color: #6c9e8f;
            --secondary-color: #1e2b3c;
            --text-color: #5b6f82;
            --light-bg: #f8fafc;
            --white: #ffffff;
            --border-light: #dee2e6;
            --shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            --success-bg: #f0f7f5;
        }
        
        [data-theme="dark"] {
            --primary-color: #7ab3a5;
            --secondary-color: #e2e8f0;
            --text-color: #94a3b8;
            --light-bg: #0f172a;
            --white: #1e293b;
            --border-light: #334155;
            --shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            --success-bg: #1e293b;
        }
        
        body {
            background: var(--light-bg);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background-color 0.3s ease;
            padding: 20px;
        }
        
        .thank-you-card {
            background: var(--white);
            border-radius: 30px;
            padding: 50px;
            text-align: center;
            box-shadow: var(--shadow);
            max-width: 550px;
            width: 100%;
            margin: 20px;
            border: 1px solid var(--border-light);
            animation: fadeIn 0.8s ease;
            position: relative;
        }
        
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        /* Theme Toggle */
        .theme-toggle {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: var(--light-bg);
            border: 1px solid var(--border-light);
            color: var(--text-color);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 1.2rem;
        }
        
        .theme-toggle:hover {
            background: var(--primary-color);
            color: white;
            transform: rotate(15deg);
        }
        
        /* Language Toggle */
        .lang-toggle {
            position: absolute;
            top: 20px;
            left: 20px;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: var(--light-bg);
            border: 1px solid var(--border-light);
            color: var(--text-color);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
            font-size: 0.9rem;
        }
        
        .lang-toggle:hover {
            background: var(--primary-color);
            color: white;
        }
        
        .success-icon {
            width: 100px;
            height: 100px;
            background: var(--primary-color);
            color: white;
            font-size: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            margin: 20px auto 25px;
            box-shadow: 0 15px 30px rgba(108, 158, 143, 0.4);
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
                box-shadow: 0 15px 30px rgba(108, 158, 143, 0.4);
            }
            50% {
                transform: scale(1.05);
                box-shadow: 0 25px 40px rgba(108, 158, 143, 0.6);
            }
        }
        
        h1 {
            color: var(--secondary-color);
            font-weight: 700;
            margin-bottom: 15px;
            font-size: 2.5rem;
        }
        
        p {
            color: var(--text-color);
            font-size: 1.1rem;
            margin-bottom: 15px;
            line-height: 1.6;
        }
        
        .email-sent {
            background: var(--success-bg);
            border: 1px solid var(--border-light);
            border-radius: 50px;
            padding: 12px 20px;
            display: inline-block;
            margin: 20px 0;
            color: var(--primary-color);
            font-weight: 500;
        }
        
        .email-sent i {
            margin-right: 8px;
        }
        
        .btn-home {
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: 600;
            text-decoration: none;
            display: inline-block;
            margin-top: 20px;
            transition: all 0.3s ease;
            width: 100%;
        }
        
        .btn-home:hover {
            background: #558b7c;
            transform: translateY(-5px);
            box-shadow: 0 15px 25px rgba(108, 158, 143, 0.3);
            color: white;
        }
        
        .btn-home i {
            margin-right: 8px;
        }
        
        .back-link {
            display: block;
            margin-top: 20px;
            color: var(--text-color);
            text-decoration: none;
            transition: color 0.3s ease;
            font-size: 0.95rem;
        }
        
        .back-link:hover {
            color: var(--primary-color);
        }
        
        .back-link i {
            margin-right: 5px;
        }
        
        /* RTL Support */
        [dir="rtl"] .theme-toggle {
            right: auto;
            left: 20px;
        }
        
        [dir="rtl"] .lang-toggle {
            left: auto;
            right: 20px;
        }
        
        [dir="rtl"] .email-sent i,
        [dir="rtl"] .btn-home i,
        [dir="rtl"] .back-link i {
            margin-right: 0;
            margin-left: 8px;
            transform: scaleX(-1);
        }
        
        /* Responsive */
        @media (max-width: 576px) {
            .thank-you-card {
                padding: 40px 25px;
            }
            
            h1 {
                font-size: 2rem;
            }
            
            .success-icon {
                width: 80px;
                height: 80px;
                font-size: 40px;
            }
        }
    </style>
</head>
<body data-theme="light">
    <div class="thank-you-card">
        <!-- Theme Toggle Button -->
        <div class="theme-toggle" id="themeToggle">
            <i class="fa-regular fa-moon"></i>
        </div>
        
        <!-- Language Toggle Button -->
        <div class="lang-toggle" id="langToggle">
            EN
        </div>
        
        <div class="success-icon">
            <i class="fa-regular fa-circle-check"></i>
        </div>
        
        <h1 data-en="Thank You!" data-ar="شكراً جزيلاً!">Thank You!</h1>
        
        <p data-en="Your message has been sent successfully. I'll get back to you as soon as possible!"
           data-ar="تم إرسال رسالتك بنجاح. سأرد عليك في أقرب وقت ممكن!">
           Your message has been sent successfully. I'll get back to you as soon as possible!
        </p>
        
        <div class="email-sent">
            <i class="fa-regular fa-envelope"></i>
            <span data-en="We've sent a confirmation to your email"
                  data-ar="لقد أرسلنا تأكيداً إلى بريدك الإلكتروني">
                  We've sent a confirmation to your email
            </span>
        </div>
        
        <a href="index.html" class="btn-home">
            <i class="fa-solid fa-house"></i>
            <span data-en="Back to Home" data-ar="العودة للرئيسية">Back to Home</span>
        </a>
        
        <a href="index.html#contact" class="back-link">
            <i class="fa-regular fa-paper-plane"></i>
            <span data-en="Send another message" data-ar="إرسال رسالة أخرى">Send another message</span>
        </a>
    </div>
    
    <script>
        // ===== THEME TOGGLE =====
        const themeToggle = document.getElementById('themeToggle');
        const body = document.body;
        const themeIcon = themeToggle.querySelector('i');
        
        // Load saved theme
        const savedTheme = localStorage.getItem('theme') || 'light';
        body.setAttribute('data-theme', savedTheme);
        updateThemeIcon(savedTheme);
        
        themeToggle.addEventListener('click', () => {
            const currentTheme = body.getAttribute('data-theme');
            const newTheme = currentTheme === 'light' ? 'dark' : 'light';
            
            body.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            updateThemeIcon(newTheme);
        });
        
        function updateThemeIcon(theme) {
            if (theme === 'dark') {
                themeIcon.className = 'fa-regular fa-sun';
            } else {
                themeIcon.className = 'fa-regular fa-moon';
            }
        }
        
        // ===== LANGUAGE TOGGLE =====
        const langToggle = document.getElementById('langToggle');
        let currentLang = localStorage.getItem('lang') || 'en';
        
        function applyLanguage(lang) {
            document.querySelectorAll('[data-en]').forEach(el => {
                el.textContent = el.getAttribute(`data-${lang}`);
            });
            
            if (lang === 'ar') {
                document.documentElement.dir = 'rtl';
                document.documentElement.lang = 'ar';
                langToggle.textContent = 'EN';
            } else {
                document.documentElement.dir = 'ltr';
                document.documentElement.lang = 'en';
                langToggle.textContent = 'AR';
            }
            
            localStorage.setItem('lang', lang);
        }
        
        // Initial language
        applyLanguage(currentLang);
        
        langToggle.addEventListener('click', () => {
            currentLang = currentLang === 'en' ? 'ar' : 'en';
            applyLanguage(currentLang);
        });
    </script>
</body>
</html>
